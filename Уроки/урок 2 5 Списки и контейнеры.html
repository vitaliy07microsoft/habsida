<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lists</title>
</head>
<body>
    <h1>Lists</h1>
    <div>
        <div>About me</div>
        <div>Hi, my name is <b>Vitaliy</b></div>
        <div>My hobbies:</div>
        <ul>
            <li>Playing games</li>
            <li>Studying programming</li>
            <li>Taking Photos</li>
            
        </ul>
    </div>

    <br><br><br><br><br>

    <div>
        <div><u>Names of students</u></div>
        <ol>
            <li>Lera</li>
            <li>Julia</li>
            <li>Nikolai</li>
            <li>Gerasim</li>
            <li>Meri</li>
        </ol>
    </div>

    <br><br><br><br><br>

    <div>
        <div><i>Terms</i></div>
        <dl>
            <dt>HTML</dt>
            <dd>- Hypertext Markup Language</dd>
            <dt>CSS</dt>
            <dd>- Cascade Style Sheets</dd>
        </dl>
    </div>
</body>
</html>
